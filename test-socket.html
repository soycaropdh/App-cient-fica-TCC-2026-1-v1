<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Socket TCC</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    #mensajes { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    input { width: 70%; padding: 8px; }
    button { padding: 8px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
    .sistema { color: gray; font-style: italic; }
  </style>
</head>
<body>
  <h2>🧪 Test Chat Público - TCC</h2>

  <div>
    <input id="nombre" placeholder="Tu nombre" />
    <button onclick="unirse()">Unirse</button>
  </div>
  <br>
  <div id="mensajes"></div>
  <input id="mensaje" placeholder="Escribe un mensaje..." />
  <button onclick="enviar()">Enviar</button>
  <p>Usuarios conectados: <strong id="usuarios"></strong></p>

  <script>
    const socket = io('http://localhost:3000');

    function unirse() {
      const nombre = document.getElementById('nombre').value;
      if (nombre) socket.emit('unirse', nombre);
    }

    function enviar() {
      const nombre = document.getElementById('nombre').value;
      const texto = document.getElementById('mensaje').value;
      if (texto) {
        socket.emit('mensajePublico', { usuario: nombre, texto });
        document.getElementById('mensaje').value = '';
      }
    }

    socket.on('mensaje', (data) => {
      const div = document.getElementById('mensajes');
      const clase = data.usuario === 'Sistema' ? 'sistema' : '';
      div.innerHTML += `<p class="${clase}"><strong>${data.usuario}</strong> [${data.hora}]: ${data.texto}</p>`;
      div.scrollTop = div.scrollHeight;
    });

    socket.on('usuariosConectados', (usuarios) => {
      document.getElementById('usuarios').textContent = usuarios.join(', ');
    });
  </script>
</body>
</html>
